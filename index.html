<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistema Contábil - Cliente e Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2a24 0%, #051c18 100%);
            color: #E6F7F3;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #F2F9F7 0%, #F2CAA7 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.8rem;
            color: #a3c2bc;
        }

        .user-info {
            background: rgba(12, 89, 68, 0.7);
            padding: 10px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            color: #F2CAA7;
        }

        .btn-sair {
            background: #1D4039;
            border: 1px solid #F2BA52;
            padding: 6px 15px;
            border-radius: 30px;
            color: #F2CAA7;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-sair:hover {
            background: #0C5944;
        }

        /* Cards */
        .card {
            background: rgba(12, 89, 68, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            border: 1px solid rgba(242, 186, 82, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .card-header {
            background: #0C5944;
            padding: 1.2rem 2rem;
            border-bottom: 2px solid #F2BA52;
        }

        .card-header h2 {
            font-size: 1.3rem;
            color: #F2CAA7;
        }

        .card-header i {
            margin-right: 10px;
            color: #F2BA52;
        }

        .card-body {
            padding: 2rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            background: rgba(29, 64, 57, 0.5);
            padding: 5px;
            border-radius: 50px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #a3c2bc;
            cursor: pointer;
            border-radius: 40px;
            font-weight: 600;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #F2BA52;
            color: #0C2B24;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Formulário */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #F2CAA7;
            font-size: 0.85rem;
        }

        .input-group label i {
            margin-right: 8px;
            color: #F2BA52;
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 12px 18px;
            background: #1D4039;
            border: 1px solid #0C5944;
            border-radius: 28px;
            font-size: 0.95rem;
            color: #F2F9F7;
            transition: all 0.2s;
        }

        .input-group input:focus, 
        .input-group select:focus {
            outline: none;
            border-color: #F2BA52;
            box-shadow: 0 0 0 3px rgba(242, 186, 82, 0.2);
        }

        .radio-group {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            margin-top: 8px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            margin-bottom: 0;
        }

        .quantidade-extra {
            margin-top: 10px;
            display: none;
        }

        .quantidade-extra.show {
            display: block;
        }

        .full-width {
            grid-column: span 2;
        }

        /* Botões */
        .btn-primary {
            background: linear-gradient(95deg, #F2BA52, #F2CAA7);
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: #0C2B24;
            cursor: pointer;
            transition: all 0.25s;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.03);
        }

        .btn-secondary {
            background: #1D4039;
            border: 1px solid #F2BA52;
            padding: 12px 20px;
            border-radius: 60px;
            color: #F2CAA7;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-secondary:hover {
            background: #0C5944;
        }

        /* Tabela Admin */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(242, 186, 82, 0.2);
        }

        th {
            color: #F2BA52;
            font-weight: 600;
        }

        td {
            color: #E6F7F3;
        }

        .btn-ver-contrato {
            background: #F2BA52;
            color: #0C2B24;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Contrato */
        .contrato-preview {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .contrato-preview h3 {
            color: #0C5944;
            margin-bottom: 20px;
        }

        .valor-destaque {
            font-size: 2rem;
            font-weight: bold;
            color: #F2BA52;
            background: #1D4039;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            margin: 15px 0;
        }

        /* Login/Registro */
        .login-register {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .login-box, .register-box {
            flex: 1;
            min-width: 280px;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .loading.show {
            display: block;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            font-size: 0.8rem;
            color: #a3c2bc;
            border-top: 1px solid rgba(242, 186, 82, 0.25);
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
            .login-register {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- Conteúdo será renderizado aqui via JavaScript -->
</div>

<script>
    // ==================== BANCO DE DADOS LOCAL (simulado) ====================
    let clients = JSON.parse(localStorage.getItem('clients') || '[]');
    let responses = JSON.parse(localStorage.getItem('responses') || '[]');
    let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');

    // ==================== FUNÇÕES AUXILIARES ====================
    function saveData() {
        localStorage.setItem('clients', JSON.stringify(clients));
        localStorage.setItem('responses', JSON.stringify(responses));
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
    }

    // Registrar cliente
    function registerClient(email, password, nome) {
        if (clients.find(c => c.email === email)) {
            return { success: false, message: 'E-mail já cadastrado!' };
        }
        clients.push({ email, password, nome, type: 'client', createdAt: new Date().toISOString() });
        saveData();
        return { success: true, message: 'Cadastro realizado com sucesso!' };
    }

    // Login
    function login(email, password) {
        const user = clients.find(c => c.email === email && c.password === password);
        if (user) {
            currentUser = user;
            saveData();
            return { success: true, user: user };
        }
        return { success: false, message: 'E-mail ou senha incorretos!' };
    }

    // Logout
    function logout() {
        currentUser = null;
        saveData();
        render();
    }

    // Salvar resposta do formulário
    function saveResponse(data) {
        const newResponse = {
            id: Date.now(),
            clientId: currentUser.email,
            clientName: currentUser.nome,
            ...data,
            submittedAt: new Date().toISOString(),
            valorContrato: calcularValorContrato(data)
        };
        responses.push(newResponse);
        saveData();
        return newResponse;
    }

    // Calcular valor do contrato baseado nos dados
    function calcularValorContrato(data) {
        let valorBase = 500; // Valor base da consultoria
        
        // Adiciona por dependente
        valorBase += (parseInt(data.dependentes) || 0) * 50;
        
        // Adiciona por tipo de renda
        valorBase += (parseInt(data.tiposRenda) || 0) * 100;
        
        // Adiciona por bens
        valorBase += (parseInt(data.bens) || 0) * 30;
        
        // Adiciona por dívidas
        valorBase += (parseInt(data.dividas) || 0) * 40;
        
        // Consultoria extra
        if (data.consultoria === 'Sim') {
            const qtd = parseInt(data.quantidadeConsultoria) || 1;
            valorBase += qtd * 150;
        }
        
        return valorBase;
    }

    // Gerar contrato em HTML
    function gerarContrato(data, valor) {
        return `
            <div style="font-family: 'Times New Roman', serif; padding: 20px;">
                <h2 style="text-align: center; color: #0C5944;">CONTRATO DE PRESTAÇÃO DE SERVIÇOS CONTÁBEIS</h2>
                <p style="text-align: center;">Contrato nº ${data.id || new Date().getTime()}</p>
                
                <p><strong>CONTRATANTE:</strong> ${data.nome}</p>
                <p><strong>CPF:</strong> ${data.cpf}</p>
                <p><strong>E-mail:</strong> ${data.email}</p>
                
                <h3>Cláusula 1 - DO OBJETO</h3>
                <p>O presente contrato tem como objeto a prestação de serviços de consultoria e assessoria contábil, conforme dados fornecidos pelo CONTRATANTE.</p>
                
                <h3>Cláusula 2 - DADOS DECLARADOS</h3>
                <ul>
                    <li>Quantidade de dependentes: ${data.dependentes}</li>
                    <li>Quantidade de tipos de renda: ${data.tiposRenda}</li>
                    <li>Quantidade de bens e direitos: ${data.bens}</li>
                    <li>Quantidade de dívidas e ônus: ${data.dividas}</li>
                    <li>Consultoria extra: ${data.consultoria} ${data.consultoria === 'Sim' ? `(${data.quantidadeConsultoria} sessões)` : ''}</li>
                </ul>
                
                <h3>Cláusula 3 - DO VALOR</h3>
                <p>O valor total do presente contrato é de <strong>R$ ${valor.toFixed(2)}</strong> (${valorPorExtenso(valor)}), a ser pago conforme condições acordadas entre as partes.</p>
                
                <h3>Cláusula 4 - DA VIGÊNCIA</h3>
                <p>O presente contrato entra em vigor na data de sua assinatura, com validade de 12 meses.</p>
                
                <h3>Cláusula 5 - DAS DISPOSIÇÕES GERAIS</h3>
                <p>Fica eleito o foro da comarca de [CIDADE] para dirimir quaisquer dúvidas oriundas do presente contrato.</p>
                
                <br><br>
                <div style="display: flex; justify-content: space-between; margin-top: 50px;">
                    <div style="text-align: center;">
                        <hr style="width: 200px;">
                        <p>${data.nome}</p>
                        <p>CONTRATANTE</p>
                    </div>
                    <div style="text-align: center;">
                        <hr style="width: 200px;">
                        <p>[NOME DA EMPRESA]</p>
                        <p>CONTRATADA</p>
                    </div>
                </div>
                <p style="text-align: center; margin-top: 30px; font-size: 12px;">Data: ${new Date().toLocaleDateString('pt-BR')}</p>
            </div>
        `;
    }

    // Função simples para valor por extenso
    function valorPorExtenso(valor) {
        const reais = Math.floor(valor);
        const centavos = Math.round((valor - reais) * 100);
        return `${reais} reais${centavos > 0 ? ` e ${centavos} centavos` : ''}`;
    }

    // ==================== RENDERIZAÇÃO DAS TELAS ====================
    function render() {
        const app = document.getElementById('app');
        
        if (!currentUser) {
            // Tela de Login/Registro
            app.innerHTML = `
                <div class="header">
                    <div class="logo">
                        <h1>📊 Sistema Contábil</h1>
                        <p>Gestão de dados e contratos</p>
                    </div>
                </div>
                <div class="login-register">
                    <div class="card login-box">
                        <div class="card-header">
                            <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
                        </div>
                        <div class="card-body">
                            <div class="input-group">
                                <label><i class="fas fa-envelope"></i> E-mail</label>
                                <input type="email" id="loginEmail" placeholder="seuemail@exemplo.com">
                            </div>
                            <div class="input-group">
                                <label><i class="fas fa-lock"></i> Senha</label>
                                <input type="password" id="loginPassword" placeholder="********">
                            </div>
                            <button class="btn-primary" id="btnLogin">Entrar</button>
                            <div class="loading" id="loginLoading"><i class="fas fa-spinner fa-spin"></i> Entrando...</div>
                        </div>
                    </div>
                    <div class="card register-box">
                        <div class="card-header">
                            <h2><i class="fas fa-user-plus"></i> Registrar</h2>
                        </div>
                        <div class="card-body">
                            <div class="input-group">
                                <label><i class="fas fa-user"></i> Nome completo</label>
                                <input type="text" id="regNome" placeholder="Seu nome">
                            </div>
                            <div class="input-group">
                                <label><i class="fas fa-envelope"></i> E-mail</label>
                                <input type="email" id="regEmail" placeholder="seuemail@exemplo.com">
                            </div>
                            <div class="input-group">
                                <label><i class="fas fa-lock"></i> Senha</label>
                                <input type="password" id="regPassword" placeholder="********">
                            </div>
                            <button class="btn-primary" id="btnRegister">Cadastrar</button>
                            <div class="loading" id="registerLoading"><i class="fas fa-spinner fa-spin"></i> Cadastrando...</div>
                        </div>
                    </div>
                </div>
                <div class="footer">
                    <i class="fas fa-shield-alt"></i> Sistema seguro · Dados criptografados localmente
                </div>
            `;
            
            document.getElementById('btnLogin')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const loading = document.getElementById('loginLoading');
                loading.classList.add('show');
                setTimeout(() => {
                    const result = login(email, password);
                    loading.classList.remove('show');
                    if (result.success) {
                        render();
                    } else {
                        alert(result.message);
                    }
                }, 500);
            });
            
            document.getElementById('btnRegister')?.addEventListener('click', () => {
                const nome = document.getElementById('regNome').value;
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPassword').value;
                if (!nome || !email || !password) {
                    alert('Preencha todos os campos!');
                    return;
                }
                const loading = document.getElementById('registerLoading');
                loading.classList.add('show');
                setTimeout(() => {
                    const result = registerClient(email, password, nome);
                    loading.classList.remove('show');
                    if (result.success) {
                        alert(result.message);
                        document.getElementById('loginEmail').value = email;
                        document.getElementById('loginPassword').value = password;
                    } else {
                        alert(result.message);
                    }
                }, 500);
            });
            return;
        }
        
        // Usuário logado - verificar se é admin
        const isAdmin = currentUser.email === 'admin@admin.com' || currentUser.password === 'admin123';
        
        if (isAdmin) {
            // TELA DO ADMIN
            const responsesList = responses;
            app.innerHTML = `
                <div class="header">
                    <div class="logo">
                        <h1>📊 Painel Administrativo</h1>
                        <p>Gestão de respostas e contratos</p>
                    </div>
                    <div class="user-info">
                        <span><i class="fas fa-user-shield"></i> Admin</span>
                        <button class="btn-sair" id="btnSair"><i class="fas fa-sign-out-alt"></i> Sair</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-database"></i> Respostas dos Clientes</h2>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table>
                                <thead>
                                    <tr><th>Cliente</th><th>Email</th><th>Data</th><th>Valor Contrato</th><th>Ações</th></tr>
                                </thead>
                                <tbody id="adminTableBody">
                                    ${responsesList.map(res => `
                                        <tr>
                                            <td>${res.clientName}</td>
                                            <td>${res.clientId}</td>
                                            <td>${new Date(res.submittedAt).toLocaleDateString('pt-BR')}</td>
                                            <td>R$ ${res.valorContrato.toFixed(2)}</td>
                                            <td><button class="btn-ver-contrato" onclick="viewContract(${res.id})">Ver Contrato</button></td>
                                        </tr>
                                    `).join('')}
                                    ${responsesList.length === 0 ? '<tr><td colspan="5" style="text-align: center;">Nenhuma resposta cadastrada ainda.</td></tr>' : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="footer">
                    <i class="fas fa-chart-line"></i> Total de respostas: ${responsesList.length} | Total em contratos: R$ ${responsesList.reduce((sum, r) => sum + r.valorContrato, 0).toFixed(2)}
                </div>
            `;
            document.getElementById('btnSair')?.addEventListener('click', logout);
            window.viewContract = (id) => {
                const response = responses.find(r => r.id === id);
                if (response) {
                    const contratoHtml = gerarContrato(response, response.valorContrato);
                    const modalWindow = window.open('', '_blank', 'width=800,height=600');
                    modalWindow.document.write(`
                        <html><head><title>Contrato - ${response.clientName}</title>
                        <style>body { font-family: Arial, sans-serif; padding: 20px; }</style></head>
                        <body>${contratoHtml}</body></html>
                    `);
                    modalWindow.document.close();
                }
            };
            return;
        }
        
        // TELA DO CLIENTE
        const userResponses = responses.filter(r => r.clientId === currentUser.email);
        const ultimaResposta = userResponses[userResponses.length - 1];
        
        app.innerHTML = `
            <div class="header">
                <div class="logo">
                    <h1>📊 Sistema Contábil</h1>
                    <p>Olá, ${currentUser.nome}</p>
                </div>
                <div class="user-info">
                    <span><i class="fas fa-user"></i> ${currentUser.email}</span>
                    <button class="btn-sair" id="btnSair"><i class="fas fa-sign-out-alt"></i> Sair</button>
                </div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="form">📝 Formulário</button>
                <button class="tab-btn" data-tab="historico">📜 Histórico</button>
                <button class="tab-btn" data-tab="contrato">📄 Último Contrato</button>
            </div>
            
            <!-- Tab Formulário -->
            <div class="tab-content active" id="tab-form">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-edit"></i> Preencha seus dados contábeis</h2>
                    </div>
                    <div class="card-body">
                        <form id="contabilForm">
                            <div class="form-grid">
                                <div class="input-group"><label><i class="fas fa-user"></i> Nome completo</label><input type="text" id="nome" placeholder="Digite seu nome completo" required></div>
                                <div class="input-group"><label><i class="fas fa-id-card"></i> CPF</label><input type="text" id="cpf" placeholder="000.000.000-00" required></div>
                                <div class="input-group"><label><i class="fas fa-envelope"></i> E-mail</label><input type="email" id="email" value="${currentUser.email}" readonly style="opacity:0.7;"></div>
                                <div class="input-group"><label><i class="fas fa-users"></i> Dependentes</label><input type="number" id="dependentes" min="0" value="0"></div>
                                <div class="input-group"><label><i class="fas fa-money-bill-wave"></i> Tipos de renda</label><input type="number" id="tiposRenda" min="0" value="0"></div>
                                <div class="input-group"><label><i class="fas fa-car"></i> Bens e direitos</label><input type="number" id="bens" min="0" value="0"></div>
                                <div class="input-group"><label><i class="fas fa-file-invoice"></i> Dívidas e ônus</label><input type="number" id="dividas" min="0" value="0"></div>
                                <div class="input-group">
                                    <label><i class="fas fa-headset"></i> Consultoria extra</label>
                                    <div class="radio-group">
                                        <label><input type="radio" name="consultoria" value="Sim" class="consultoria-radio"> Sim</label>
                                        <label><input type="radio" name="consultoria" value="Não" class="consultoria-radio" checked> Não</label>
                                    </div>
                                    <div id="quantidadeExtra" class="quantidade-extra">
                                        <input type="number" id="quantidadeConsultoria" min="1" placeholder="Quantas horas/sessões?">
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Gerar Contrato</button>
                            <div class="loading" id="formLoading"><i class="fas fa-spinner fa-spin"></i> Processando...</div>
                        </form>
                    </div>
                </div>
            </div>
            
            <!-- Tab Histórico -->
            <div class="tab-content" id="tab-historico">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-history"></i> Histórico de Respostas</h2>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table>
                                <thead><tr><th>Data</th><th>Dependentes</th><th>Rendas</th><th>Bens</th><th>Dívidas</th><th>Valor Contrato</th></tr></thead>
                                <tbody>
                                    ${userResponses.map(res => `
                                        <tr>
                                            <td>${new Date(res.submittedAt).toLocaleDateString('pt-BR')}</td>
                                            <td>${res.dependentes}</td>
                                            <td>${res.tiposRenda}</td>
                                            <td>${res.bens}</td>
                                            <td>${res.dividas}</td>
                                            <td>R$ ${res.valorContrato.toFixed(2)}</td>
                                        </tr>
                                    `).join('')}
                                    ${userResponses.length === 0 ? '<tr><td colspan="6" style="text-align: center;">Nenhum formulário enviado ainda.</td></tr>' : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Tab Contrato -->
            <div class="tab-content" id="tab-contrato">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-file-signature"></i> Último Contrato Gerado</h2>
                    </div>
                    <div class="card-body">
                        ${ultimaResposta ? `
                            <div style="text-align: center; margin-bottom: 20px;">
                                <div class="valor-destaque">R$ ${ultimaResposta.valorContrato.toFixed(2)}</div>
                                <p>Contrato gerado em ${new Date(ultimaResposta.submittedAt).toLocaleString('pt-BR')}</p>
                                <button class="btn-primary" id="btnBaixarContrato" style="width: auto; padding: 10px 30px;"><i class="fas fa-download"></i> Baixar Contrato</button>
                            </div>
                            <div class="contrato-preview" id="contratoPreview">
                                ${gerarContrato(ultimaResposta, ultimaResposta.valorContrato)}
                            </div>
                        ` : '<p style="text-align: center;">Nenhum contrato gerado ainda. Preencha o formulário primeiro.</p>'}
                    </div>
                </div>
            </div>
            <div class="footer">
                <i class="fas fa-shield-alt"></i> Seus dados estão seguros
            </div>
        `;
        
        // Eventos das tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
            });
        });
        
        // Mostrar campo quantidade se consultoria for Sim
        const radioSim = document.querySelector('input[value="Sim"]');
        const radioNao = document.querySelector('input[value="Não"]');
        const quantidadeExtraDiv = document.getElementById('quantidadeExtra');
        
        function toggleQuantidade() {
            if (radioSim?.checked) {
                quantidadeExtraDiv?.classList.add('show');
            } else {
                quantidadeExtraDiv?.classList.remove('show');
            }
        }
        radioSim?.addEventListener('change', toggleQuantidade);
        radioNao?.addEventListener('change', toggleQuantidade);
        
        // Máscara CPF
        const cpfInput = document.getElementById('cpf');
        if (cpfInput) {
            cpfInput.addEventListener('input', function(e) {
                let value = this.value.replace(/\D/g, '');
                if (value.length <= 11) {
                    value = value.replace(/(\d{3})(\d)/, '$1.$2');
                    value = value.replace(/(\d{3})(\d)/, '$1.$2');
                    value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                    this.value = value;
                }
            });
        }
        
        // Submissão do formulário
        const formContabil = document.getElementById('contabilForm');
        if (formContabil) {
            formContabil.addEventListener('submit', (e) => {
                e.preventDefault();
                const nome = document.getElementById('nome').value;
                const cpf = document.getElementById('cpf').value;
                const email = document.getElementById('email').value;
                const dependentes = document.getElementById('dependentes').value;
                const tiposRenda = document.getElementById('tiposRenda').value;
                const bens = document.getElementById('bens').value;
                const dividas = document.getElementById('dividas').value;
                const consultoria = document.querySelector('input[name="consultoria"]:checked').value;
                const quantidadeConsultoria = consultoria === 'Sim' ? document.getElementById('quantidadeConsultoria').value : '';
                
                if (!nome || !cpf || cpf.replace(/\D/g, '').length !== 11) {
                    alert('Preencha o nome e um CPF válido com 11 dígitos.');
                    return;
                }
                
                const formLoading = document.getElementById('formLoading');
                formLoading.classList.add('show');
                
                setTimeout(() => {
                    const dados = { nome, cpf, email, dependentes, tiposRenda, bens, dividas, consultoria, quantidadeConsultoria };
                    const novaResposta = saveResponse(dados);
                    formLoading.classList.remove('show');
                    alert(`Contrato gerado com sucesso! Valor: R$ ${novaResposta.valorContrato.toFixed(2)}`);
                    render();
                }, 500);
            });
        }
        
        // Botão baixar contrato
        const btnBaixar = document.getElementById('btnBaixarContrato');
        if (btnBaixar && ultimaResposta) {
            btnBaixar.addEventListener('click', () => {
                const contratoHtml = gerarContrato(ultimaResposta, ultimaResposta.valorContrato);
                const blob = new Blob([contratoHtml], { type: 'text/html' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `contrato_${currentUser.nome.replace(/\s/g, '_')}_${new Date().toISOString().slice(0,10)}.html`;
                link.click();
            });
        }
        
        document.getElementById('btnSair')?.addEventListener('click', logout);
    }
    
    // Inicializar com dados de exemplo (admin padrão)
    function init() {
        if (!clients.find(c => c.email === 'admin@admin.com')) {
            clients.push({ email: 'admin@admin.com', password: 'admin123', nome: 'Administrador', type: 'admin' });
        }
        saveData();
        render();
    }
    
    init();
</script>
</body>
</html>
